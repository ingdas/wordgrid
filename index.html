<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#faf5ea" />
    <!-- CrazyGames SDK. Loads defensively: src/sdk.ts no-ops every call when the
         SDK is absent (local play, GitHub Pages), so this is safe everywhere. -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js" async></script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23d9482b'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='%23faf5ea'%3E%E2%97%86%3C/text%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="Four hidden groups. One secret word links them all. Can you find it? A free daily word puzzle."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="WordGrid" />

    <!-- Open Graph / Twitter: rich previews when the link is shared. og:image
         should be an absolute URL; update the host if you deploy elsewhere. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WordGrid" />
    <meta property="og:title" content="WordGrid — Find the secret word" />
    <meta
      property="og:description"
      content="Four hidden groups. One secret word links them all. Can you find it?"
    />
    <meta property="og:image" content="https://ingdas.github.io/wordgrid/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WordGrid — Find the secret word" />
    <meta
      name="twitter:description"
      content="Four hidden groups. One secret word links them all. Can you find it?"
    />
    <meta name="twitter:image" content="https://ingdas.github.io/wordgrid/og-image.png" />

    <title>WordGrid — Find the Four</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Shown only on short landscape viewports (phones turned sideways). A
         portrait word puzzle plays best upright; tablets/desktop never see it. -->
    <div class="rotate-hint" role="alert">
      <div class="rotate-hint__icon" aria-hidden="true">📲</div>
      <div class="rotate-hint__title">Rotate to portrait</div>
      <p class="rotate-hint__body">WordGrid plays best with your phone upright.</p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
